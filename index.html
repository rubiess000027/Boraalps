<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bir Şans Daha?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <h1 class="glow">Canim Naber 💖</h1>

    <p>
        Tahminen ne zaman ciddi konusuurz 😉😘
    </p>

    <div class="buttons">
        <button class="yes" onclick="showLove()">Bir Şans Daha 💕</button>
        <button class="no" onmouseover="moveButton()">Yok </button>
    </div>
</div>

<script>
function moveButton() {
    const button = document.querySelector(".no");
    const x = Math.random() * 300 - 150;
    const y = Math.random() * 300 - 150;
    button.style.transform = `translate(${x}px, ${y}px)`;
}

function showLove() {
    document.querySelector(".container").innerHTML = `
        <h1 class="glow">İyi ki Sen ❤️</h1>
        <p>yuzyil basliyo.</p>
    `;
}
</script>

</body>
</html>
